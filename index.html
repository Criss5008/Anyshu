<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Galería</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c; --surface: #111114; --border: #222228;
  --gold: #c9a84c; --gold2: #e8cb7a; --gold3: #f5e0a0;
  --cream: #f5f0e8; --muted: #55555f; --white: #f0f0f5;
}
html { font-size: 125%; }
html, body { height: 100%; }
body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--white); overflow-x: hidden; }

/* ══ INTRO ══ */
#intro {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #060608; z-index: 200;
  transition: opacity 1s ease, visibility 1s;
}
#intro.hide { opacity: 0; visibility: hidden; pointer-events: none; }
.intro-line { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 24px 0; }
.intro-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); margin-bottom: 28px; }
#intro h1 {
  font-family: 'Cormorant Garamond', serif; font-weight: 300;
  font-size: clamp(3rem, 9vw, 6.5rem); letter-spacing: 0.22em;
  color: var(--cream); text-transform: uppercase;
}
#intro p { font-weight: 200; font-size: 0.68rem; letter-spacing: 0.48em; color: var(--gold); text-transform: uppercase; margin-top: 10px; }
.enter-btn {
  margin-top: 56px; padding: 13px 52px;
  background: transparent; border: 1px solid var(--gold); color: var(--gold);
  font-family: 'Montserrat', sans-serif; font-weight: 300;
  font-size: 0.64rem; letter-spacing: 0.38em; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden; transition: color 0.3s;
}
.enter-btn::before {
  content:''; position:absolute; inset:0; background: var(--gold);
  transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; z-index:-1;
}
.enter-btn:hover { color: #060608; }
.enter-btn:hover::before { transform: scaleX(1); }

/* ══ PAGE ══ */
#gallery-page { min-height: 100vh; opacity: 0; transition: opacity 0.8s ease 0.3s; }
#gallery-page.visible { opacity: 1; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(10,10,12,0.95); backdrop-filter: blur(16px); z-index: 50;
}
.topbar-logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.45rem; font-weight: 300; letter-spacing: 0.1em; color: var(--cream); }
.topbar-logo span { color: var(--gold); }
.photo-count { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

/* ══ FEATURED ══ */
.featured-wrap { padding: 56px 48px 0; animation: fadeUp 0.6s ease both; }
.featured-label {
  font-size: 0.55rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold);
  margin-bottom: 22px; display: flex; align-items: center; gap: 14px;
}
.featured-label::before { content:''; width:32px; height:1px; background:var(--gold); opacity:0.5; }
.featured-label::after  { content:''; flex:1; height:1px; background: var(--border); }
.featured-card { display: flex; gap: 40px; align-items: flex-start; max-width: 860px; }

/* tilt container */
.tilt-container { perspective: 900px; flex-shrink: 0; }
.tilt-card {
  position: relative; width: 320px; height: 320px;
  transform-style: preserve-3d;
  transition: transform 0.1s linear, box-shadow 0.2s;
  cursor: pointer; will-change: transform;
}
.tilt-card:not(.active) { transition: transform 0.6s ease, box-shadow 0.6s; }

.tilt-frame-outer {
  position: absolute; inset: 0; padding: 12px;
  background: linear-gradient(145deg,#201b10,#342a14,#1a1508);
  border: 1px solid #5a4a28;
  box-shadow: inset 0 0 0 1px #6a5a38, 0 0 0 1px #0a0800;
}
.tilt-frame-inner {
  position: absolute; inset: 12px; padding: 8px;
  background: #060502; border: 1px solid #3e3418;
  box-shadow: inset 0 0 0 1px #4e4428;
}
.tilt-img-wrap { position: absolute; inset: 20px; overflow: hidden; }
.tilt-img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  filter: brightness(0.95) saturate(0.9); transition: filter 0.3s;
}
.tilt-card:hover .tilt-img-wrap img { filter: brightness(1.05) saturate(1.1); }

.tilt-img-wrap::before,.tilt-img-wrap::after,.f-bl,.f-br {
  content:''; position:absolute; width:20px; height:20px; z-index:2;
  border-color: var(--gold2); border-style:solid; opacity:0.8;
}
.tilt-img-wrap::before { top:6px; left:6px;  border-width:2px 0 0 2px; }
.tilt-img-wrap::after  { top:6px; right:6px; border-width:2px 2px 0 0; }
.f-bl { bottom:6px; left:6px;  border-width:0 0 2px 2px; }
.f-br { bottom:6px; right:6px; border-width:0 2px 2px 0; }

.holo-layer {
  position: absolute; inset: 20px; pointer-events: none; z-index: 10;
  background: conic-gradient(
    from 0deg, hsla(0,100%,70%,0), hsla(40,100%,70%,0.06),
    hsla(80,100%,70%,0.08), hsla(140,100%,70%,0.06),
    hsla(200,100%,70%,0.08), hsla(260,100%,70%,0.06),
    hsla(320,100%,70%,0.08), hsla(360,100%,70%,0)
  );
  mix-blend-mode: screen; opacity: 0; transition: opacity 0.3s;
}
.tilt-card:hover .holo-layer { opacity: 1; }
.glare-layer {
  position: absolute; inset: 0; z-index: 11; pointer-events: none;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.tilt-card:hover .glare-layer { opacity: 1; }

.featured-info { flex: 1; padding-top: 12px; }
.feat-num-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.feat-num {
  font-family: 'Cormorant Garamond', serif; font-weight: 300;
  font-size: clamp(3.5rem, 7vw, 5.5rem);
  color: var(--cream); letter-spacing: 0.05em; line-height: 1; margin-bottom: 8px;
}
.feat-divider { width: 40px; height: 1px; background: var(--gold); opacity: 0.5; margin-bottom: 18px; }
.feat-desc { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); line-height: 2; }
.feat-badge {
  display: inline-flex; align-items: center; gap: 8px; margin-top: 28px;
  padding: 8px 18px; border: 1px solid rgba(201,168,76,0.35);
  font-size: 0.55rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold);
}
.feat-badge::before { content:''; width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }

/* ══ GRID ══ */
.gallery-wrap { padding: 52px 48px 80px; }
.section-label {
  font-size: 0.55rem; letter-spacing: 0.44em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 36px; display: flex; align-items: center; gap: 16px;
}
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 32px; }

.frame-card { position: relative; cursor: pointer; animation: fadeUp 0.5s ease both; }
.frame-card .tilt-container { perspective: 700px; width:100%; }
.frame-card .tilt-card { width:100%; height:0; padding-bottom:100%; }
.frame-card .tilt-card .tilt-frame-outer { padding: 8px; }
.frame-card .tilt-card .tilt-frame-inner { inset:8px; padding:6px; }
.frame-card .tilt-card .tilt-img-wrap { inset:14px; }
.frame-card .tilt-card .tilt-img-wrap::before,.frame-card .tilt-card .tilt-img-wrap::after,
.frame-card .tilt-card .f-bl,.frame-card .tilt-card .f-br { width:14px; height:14px; }
.frame-card .tilt-card .tilt-img-wrap::before { top:4px; left:4px; }
.frame-card .tilt-card .tilt-img-wrap::after  { top:4px; right:4px; }
.frame-card .tilt-card .f-bl { bottom:4px; left:4px; }
.frame-card .tilt-card .f-br { bottom:4px; right:4px; }
.frame-card .tilt-card .tilt-img-wrap img { width:100%; height:100%; display:block; object-fit:cover; }
.frame-caption { padding: 10px 2px 2px; text-align:center; }
.frame-caption-num { font-size:0.55rem; letter-spacing:0.38em; color:var(--muted); text-transform:uppercase; }
@keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

/* ══ LIGHTBOX ══ */
#lb {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.97); align-items:center; justify-content:center;
  padding:8px; backdrop-filter:blur(20px);
}
#lb.open { display:flex; }
.lb-wrap { display:flex; flex-direction:column; align-items:center; animation:lbIn 0.28s ease; }
@keyframes lbIn { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }

/* The fixed frame — adapts to image aspect ratio */
.lb-frame {
  position: relative;
  max-width: 95vw;
  max-height: 88vh;
  padding: 14px;
  background: linear-gradient(145deg,#201b10,#342a14,#1a1508);
  border: 1px solid #5a4a28;
  box-shadow: inset 0 0 0 1px #6a5a38, 0 0 0 1px #0a0800, 0 32px 100px rgba(0,0,0,0.98);
  transform-style: preserve-3d;
  transition: transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.2s;
  will-change: transform;
}

/* image viewport — clips the zoomed image */
.lb-viewport {
  position: relative;
  overflow: hidden;
  cursor: zoom-in;
  max-height: calc(88vh - 28px);
}
.lb-viewport.zoomed   { cursor: grab; }
.lb-viewport.grabbing { cursor: grabbing; }

#lb-img {
  display: block;
  max-width: 92vw;
  max-height: calc(86vh - 28px);
  width: auto; height: auto;
  transform-origin: center center;
  user-select: none; pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}

/* corner ornaments in lightbox */
.lb-corner {
  position: absolute; z-index: 20; pointer-events: none;
  width: 24px; height: 24px;
  border-color: var(--gold2); border-style: solid; opacity: 0.85;
}
.lb-corner.tl { top:20px;    left:20px;             border-width:2px 0 0 2px; }
.lb-corner.tr { top:20px;    right:20px;            border-width:2px 2px 0 0; }
.lb-corner.bl { bottom:20px; left:20px;             border-width:0 0 2px 2px; }
.lb-corner.br { bottom:20px; right:20px;            border-width:0 2px 2px 0; }

@keyframes cornerShoot {
  0%   { width:24px; height:24px; opacity:0.85; }
  35%  { width:46px; height:46px; opacity:1; }
  65%  { width:18px; height:18px; opacity:0.6; }
  100% { width:24px; height:24px; opacity:0.85; }
}
.lb-corner.animate { animation: cornerShoot 0.5s cubic-bezier(0.22,0.61,0.36,1) both; }

/* holo + glare on lb-frame */
.lb-holo {
  position:absolute; inset:14px; z-index:10; pointer-events:none;
  background: conic-gradient(
    from 0deg, hsla(0,100%,70%,0), hsla(40,100%,70%,0.05),
    hsla(80,100%,70%,0.07), hsla(140,100%,70%,0.05),
    hsla(200,100%,70%,0.07), hsla(260,100%,70%,0.05),
    hsla(320,100%,70%,0.07), hsla(360,100%,70%,0)
  );
  mix-blend-mode: screen; opacity:0; transition:opacity 0.3s;
}
.lb-glare {
  position:absolute; inset:0; z-index:11; pointer-events:none;
  opacity:0; transition:opacity 0.3s;
}

.lb-info { margin-top:16px; text-align:center; }
.lb-num  { font-size:0.55rem; letter-spacing:0.35em; color:var(--muted); text-transform:uppercase; }
.lb-zoom-hint { font-size:0.5rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted); margin-top:6px; opacity:0.6; }
.zoom-pips { display:flex; gap:5px; justify-content:center; margin-top:10px; }
.zoom-pip  { width:5px; height:5px; border:1px solid #444; transform:rotate(45deg); transition: background 0.2s, border-color 0.2s; }
.zoom-pip.on { background:var(--gold); border-color:var(--gold); }

#lb-close { position:fixed; top:22px; right:28px; background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; }
#lb-close:hover { color:var(--white); }
.lb-arrow {
  position:fixed; top:50%; transform:translateY(-50%);
  background:none; border:1px solid #2a2a30; color:var(--muted);
  width:44px; height:44px; font-size:1.3rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:border-color 0.2s, color 0.2s;
}
.lb-arrow:hover { border-color:var(--gold); color:var(--gold); }
#lb-prev { left:22px; }
#lb-next { right:22px; }

@media(max-width:640px){
  .topbar{padding:16px 20px;}
  .featured-wrap{padding:36px 20px 0;}
  .featured-card{flex-direction:column; gap:24px;}
  .tilt-card{width:100%;height:0;padding-bottom:100%;}
  .gallery-wrap{padding:36px 20px 60px;}
  #grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:20px;}

  /* bigger tap targets in lightbox */
  #lb-close { top:12px; right:12px; font-size:1.8rem; padding:8px; }
  .lb-arrow  { width:52px; height:52px; font-size:1.6rem; }
  #lb-prev   { left:6px; }
  #lb-next   { right:6px; }
  .lb-info   { margin-top:10px; }

  /* prevent double-tap zoom on lightbox */
  #lb { touch-action: manipulation; }
  .lb-viewport { touch-action: none; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-line"></div>
  <div class="intro-diamond"></div>
  <h1>para mi anyshu</h1>
  <p>algunas cositas de mi para tu</p>
  <div class="intro-line"></div>
  <button class="enter-btn" onclick="enterGallery()">entrar :3 &nbsp;✦</button>
</div>

<!-- PAGE -->
<div id="gallery-page">
  <div class="topbar">
    <div class="topbar-logo">A<span>nyshu :3</span></div>
    <span class="photo-count" id="photo-count"></span>
  </div>

  <!-- FEATURED -->
  <div class="featured-wrap" id="featured-wrap" style="display:none">
    <div class="featured-label">nuevo >:3</div>
    <div class="featured-card">
      <div class="tilt-container" id="feat-tilt-container">
        <div class="tilt-card" id="feat-tilt">
          <div class="tilt-frame-outer"></div>
          <div class="tilt-frame-inner"></div>
          <div class="tilt-img-wrap">
            <img id="feat-img" src="" alt=""/>
            <div class="f-bl"></div><div class="f-br"></div>
          </div>
          <div class="holo-layer"></div>
          <div class="glare-layer"></div>
        </div>
      </div>
      <div class="featured-info">
        <div class="feat-num-label">Carta número</div>
        <div class="feat-num" id="feat-num">01</div>
        <div class="feat-divider"></div>
        <div class="feat-desc">La más reciente<br>de la colección u.u</div>
        <div class="feat-badge">✦ &nbsp; espero que te guste... </div>
      </div>
    </div>
  </div>

  <!-- GRID -->
  <div class="gallery-wrap">
    <div class="section-label">todo por ahora jeje</div>
    <div id="grid"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <button id="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)">‹</button>
  <button class="lb-arrow" id="lb-next" onclick="lbNav(+1)">›</button>
  <div class="lb-wrap">
    <div class="lb-frame" id="lb-frame">
      <div class="lb-viewport" id="lb-viewport">
        <img id="lb-img" src="" alt=""/>
      </div>
      <div class="lb-corner tl" id="lc-tl"></div>
      <div class="lb-corner tr" id="lc-tr"></div>
      <div class="lb-corner bl" id="lc-bl"></div>
      <div class="lb-corner br" id="lc-br"></div>
      <div class="lb-holo"  id="lb-holo"></div>
      <div class="lb-glare" id="lb-glare"></div>
    </div>
    <div class="lb-info">
      <div class="lb-num" id="lb-num"></div>
      <div class="lb-zoom-hint" id="lb-zoom-hint">clic para zoom</div>
      <div class="zoom-pips" id="zoom-pips"></div>
    </div>
  </div>
</div>

<script>
/* ─── CONFIG ─── */
const FORMATS = ['jpg','jpeg','png','webp','gif'];
const FOLDER  = 'fotos/';

/* ─── INTRO ─── */
function enterGallery() {
  document.getElementById('intro').classList.add('hide');
  document.getElementById('gallery-page').classList.add('visible');
}

/* ─── LOAD IMAGES ─── */
let photos = [], lbIndex = 0;

function imageExists(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = src;
  });
}
async function tryLoad(n) {
  for (const ext of FORMATS) {
    const src = FOLDER + n + '.' + ext;
    if (await imageExists(src)) return src;
  }
  return null;
}
async function loadPhotos() {
  let n=1, misses=0;
  while (misses < 3) {
    const src = await tryLoad(n);
    if (src) { photos.push({src, num:n}); misses=0; }
    else      { misses++; }
    n++;
  }
  renderAll();
}

/* ─── RENDER ─── */
function renderAll() {
  document.getElementById('photo-count').textContent =
    photos.length + (photos.length===1 ? ' foto' : ' fotos');

  if (!photos.length) {
    document.getElementById('grid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#444;font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;">
        Pon imágenes en <strong style="color:#666">fotos/</strong> nombradas 1.jpg, 2.jpg…
       </div>`;
    return;
  }

  const last = photos[photos.length - 1];
  const lastIndex = photos.length - 1;
  const fw = document.getElementById('featured-wrap');
  fw.style.display = 'block';
  document.getElementById('feat-img').src = last.src;
  document.getElementById('feat-num').textContent = String(last.num).padStart(2,'0');

  const featTilt = document.getElementById('feat-tilt');
  featTilt.addEventListener('click', () => openLB(lastIndex));

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const c = document.createElement('div');
    c.className = 'frame-card';
    c.style.animationDelay = (i * 0.055) + 's';
    c.innerHTML = `
      <div class="tilt-container">
        <div class="tilt-card" data-index="${i}">
          <div class="tilt-frame-outer"></div>
          <div class="tilt-frame-inner"></div>
          <div class="tilt-img-wrap">
            <img src="${p.src}" alt="Foto ${p.num}" loading="lazy"/>
            <div class="f-bl"></div><div class="f-br"></div>
          </div>
          <div class="holo-layer"></div>
          <div class="glare-layer"></div>
        </div>
      </div>
      <div class="frame-caption">
        <div class="frame-caption-num">— ${String(p.num).padStart(2,'0')} —</div>
      </div>`;
    c.addEventListener('click', () => openLB(i));
    grid.appendChild(c);
  });

  initTiltAll();
}

/* ─── TILT 3D (efecto Steam, galería) ─── */
function initTilt(card) {
  const holo  = card.querySelector('.holo-layer');
  const glare = card.querySelector('.glare-layer');
  const W = () => card.offsetWidth;
  const H = () => card.offsetHeight;

  card.addEventListener('mouseenter', () => card.classList.add('active'));
  card.addEventListener('mouseleave', () => {
    card.classList.remove('active');
    card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
    card.style.boxShadow = '0 8px 40px rgba(0,0,0,0.6)';
    if (holo)  { holo.style.transform = ''; holo.style.opacity = '0'; }
    if (glare) { glare.style.opacity = '0'; }
  });
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const dx = (x - W()/2) / (W()/2);
    const dy = (y - H()/2) / (H()/2);
    card.style.transform = `rotateX(${-dy*18}deg) rotateY(${dx*18}deg) scale(1.04)`;
    card.style.boxShadow = `${-dx*20}px ${-dy*20}px 50px rgba(0,0,0,0.7), 0 0 30px rgba(201,168,76,0.08)`;
    if (holo) {
      const angle = Math.atan2(dy, dx) * (180/Math.PI);
      holo.style.transform = `rotate(${angle+90}deg) scale(1.5)`;
      holo.style.opacity = String(0.4 + Math.abs(dx+dy)*0.3);
    }
    if (glare) {
      const px = (x/W()*100).toFixed(1), py = (y/H()*100).toFixed(1);
      glare.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.14) 0%, transparent 55%)`;
      glare.style.opacity = '1';
    }
  });
  card.addEventListener('click', () => {
    card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(0.97)';
    setTimeout(() => { card.style.transform = ''; }, 150);
  });
}

function initTiltAll() {
  const feat = document.getElementById('feat-tilt');
  if (feat) initTilt(feat);
  document.querySelectorAll('#grid .tilt-card').forEach(c => initTilt(c));
}

/* ─── LIGHTBOX TILT (sutil, en el frame) ─── */
function initLBTilt() {
  const frame = document.getElementById('lb-frame');
  const holo  = document.getElementById('lb-holo');
  const glare = document.getElementById('lb-glare');

  frame.addEventListener('mouseleave', () => {
    applyFrameScale(); // restore correct scale without tilt
    frame.style.boxShadow = '';
    holo.style.opacity  = '0';
    glare.style.opacity = '0';
  });
  frame.addEventListener('mousemove', e => {
    if (zoomLevel > 0) return; // no tilt while panning
    const rect = frame.getBoundingClientRect();
    const dx = (e.clientX - rect.left) / rect.width  * 2 - 1;
    const dy = (e.clientY - rect.top)  / rect.height * 2 - 1;
    const s  = getFrameScale();
    frame.style.transform = `rotateX(${-dy*6}deg) rotateY(${dx*6}deg) scale(${s})`;
    frame.style.boxShadow = `${-dx*16}px ${-dy*16}px 55px rgba(0,0,0,0.8), 0 0 40px rgba(201,168,76,0.06)`;
    const angle = Math.atan2(dy, dx) * (180/Math.PI);
    holo.style.transform = `rotate(${angle+90}deg) scale(1.6)`;
    holo.style.opacity   = String(0.3 + Math.abs(dx+dy)*0.18);
    const px = ((e.clientX-rect.left)/rect.width *100).toFixed(1);
    const py = ((e.clientY-rect.top) /rect.height*100).toFixed(1);
    glare.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.1) 0%, transparent 55%)`;
    glare.style.opacity = '1';
  });
}

/* ─── ZOOM + PAN ─── */
const ZOOM_STEPS = [1, 2, 3.5, 5, 7];
let zoomLevel = 0;
let panX = 0, panY = 0;
let isDragging = false, dragSX = 0, dragSY = 0, panSX = 0, panSY = 0;

// build pips
(function(){
  const wrap = document.getElementById('zoom-pips');
  ZOOM_STEPS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'zoom-pip'; d.id = 'pip-'+i;
    wrap.appendChild(d);
  });
})();

function updatePips() {
  ZOOM_STEPS.forEach((_,i) =>
    document.getElementById('pip-'+i).classList.toggle('on', i < zoomLevel));
}

function clampPan() {
  const img   = document.getElementById('lb-img');
  const vp    = document.getElementById('lb-viewport');
  const scale = ZOOM_STEPS[zoomLevel];
  const maxX  = (img.offsetWidth  * (scale - 1)) / 2;
  const maxY  = (img.offsetHeight * (scale - 1)) / 2;
  panX = Math.min(maxX, Math.max(-maxX, panX));
  panY = Math.min(maxY, Math.max(-maxY, panY));
}

function applyZoom(animated) {
  const img   = document.getElementById('lb-img');
  const vp    = document.getElementById('lb-viewport');
  const scale = ZOOM_STEPS[zoomLevel];
  img.style.transition = animated ? 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
  img.style.transform  = `scale(${scale}) translate(${panX/scale}px,${panY/scale}px)`;
  vp.classList.toggle('zoomed', zoomLevel > 0);
  if (isDragging) vp.classList.add('grabbing');
  else vp.classList.remove('grabbing');
}

function animateCorners() {
  ['lc-tl','lc-tr','lc-bl','lc-br'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('animate');
    void el.offsetWidth;
    el.classList.add('animate');
  });
}

// how much the frame grows per zoom level (gentle, so it doesn't overflow screen)
const FRAME_SCALE = [1, 1.12, 1.22, 1.3, 1.36];

function getFrameScale() { return FRAME_SCALE[zoomLevel] || 1; }

function applyFrameScale(extraRotX = 0, extraRotY = 0) {
  const frame = document.getElementById('lb-frame');
  const s = getFrameScale();
  frame.style.transform = `rotateX(${extraRotX}deg) rotateY(${extraRotY}deg) scale(${s})`;
}

function cycleZoom() {
  if (isDragging) return;
  zoomLevel = (zoomLevel + 1) >= ZOOM_STEPS.length ? 0 : zoomLevel + 1;
  panX = 0; panY = 0;
  const hint = document.getElementById('lb-zoom-hint');
  if (zoomLevel === 0)                          hint.textContent = 'clic para zoom';
  else if (zoomLevel === ZOOM_STEPS.length - 1) hint.textContent = `${ZOOM_STEPS[zoomLevel]}× — un clic más → volver`;
  else                                          hint.textContent = `${ZOOM_STEPS[zoomLevel]}× — arrastra para explorar`;
  animateCorners();
  applyZoom(true);
  updatePips();
  updateArrowVis();

  // nudge tilt + scale on zoom click
  const frame = document.getElementById('lb-frame');
  const s = getFrameScale();
  frame.style.transform = `rotateX(-2deg) rotateY(3deg) scale(${s})`;
  setTimeout(() => applyFrameScale(), 350);
}

function resetZoom() {
  zoomLevel = 0; panX = 0; panY = 0; isDragging = false;
  document.getElementById('lb-zoom-hint').textContent = 'clic para zoom';
  applyZoom(true);
  updatePips();
  updateArrowVis();
  applyFrameScale();
}

function updateArrowVis() {
  const v = zoomLevel > 0 ? 'hidden' : 'visible';
  document.getElementById('lb-prev').style.visibility = v;
  document.getElementById('lb-next').style.visibility = v;
}

// mouse click = zoom (only fires on non-touch devices)
const vp = document.getElementById('lb-viewport');
vp.addEventListener('click', e => {
  if (e.pointerType === 'touch') return; // touch handled by touchend
  cycleZoom();
});

vp.addEventListener('mousedown', e => {
  if (zoomLevel === 0) return;
  e.preventDefault(); e.stopPropagation();
  isDragging = true;
  dragSX = e.clientX; dragSY = e.clientY;
  panSX = panX;       panSY = panY;
  vp.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = panSX + (e.clientX - dragSX);
  panY = panSY + (e.clientY - dragSY);
  clampPan();
  applyZoom(false);
});
window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  vp.classList.remove('grabbing');
});

// touch pan + tap zoom + swipe navigation
let touchStartX = 0, touchStartY = 0, touchMoved = false;

vp.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchMoved  = false;
  if (zoomLevel === 0) return; // pan only when zoomed
  isDragging = true;
  dragSX = t.clientX; dragSY = t.clientY;
  panSX = panX;       panSY = panY;
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!e.touches.length) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) touchMoved = true;

  if (!isDragging) return;
  panX = panSX + (t.clientX - dragSX);
  panY = panSY + (t.clientY - dragSY);
  clampPan();
  applyZoom(false);
}, { passive: true });

window.addEventListener('touchend', e => {
  isDragging = false;

  // tap = cycle zoom (no drag happened)
  if (!touchMoved) {
    // check if tap was inside the viewport
    const vpEl = document.getElementById('lb-viewport');
    const rect  = vpEl.getBoundingClientRect();
    const cx    = e.changedTouches[0].clientX;
    const cy    = e.changedTouches[0].clientY;
    if (cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom) {
      cycleZoom();
    }
    return;
  }

  // swipe left/right to navigate (only when not zoomed)
  if (zoomLevel === 0) {
    const swipeDx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(swipeDx) > 50) {
      lbNav(swipeDx < 0 ? 1 : -1);
    }
  }
});

/* ─── LIGHTBOX OPEN/NAV/CLOSE ─── */
function openLB(i) {
  lbIndex = i; resetZoom(); updateLB();
  document.getElementById('lb').classList.add('open');
}
function updateLB() {
  const p = photos[lbIndex];
  document.getElementById('lb-img').src = p.src;
  document.getElementById('lb-num').textContent = 'Foto ' + p.num + ' / ' + photos.length;
  document.getElementById('lb-prev').style.opacity = lbIndex > 0 ? '1' : '0.2';
  document.getElementById('lb-next').style.opacity = lbIndex < photos.length-1 ? '1' : '0.2';
  updateArrowVis();
}
function lbNav(dir) {
  if (zoomLevel > 0) return;
  const n = lbIndex + dir;
  if (n >= 0 && n < photos.length) { lbIndex = n; resetZoom(); updateLB(); }
}
function closeLB() {
  resetZoom();
  document.getElementById('lb').classList.remove('open');
}
document.getElementById('lb').addEventListener('click', e => {
  if (e.target === document.getElementById('lb')) closeLB();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key==='ArrowLeft')  lbNav(-1);
  if (e.key==='ArrowRight') lbNav(+1);
  if (e.key==='Escape')     { if (zoomLevel > 0) resetZoom(); else closeLB(); }
});

initLBTilt();
loadPhotos();
</script>
